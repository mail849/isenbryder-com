<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isen Bryder Records</title>
    <meta name="description" content="Isen Bryder Records" />
    <meta name="theme-color" content="#050505" />

    <meta property="og:title" content="Isen Bryder Records" />
    <meta property="og:description" content="Isen Bryder Records" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="Artwork_Vi%20l%C3%B8ber_photo_KasparVig.jpg" />

    <style>
      :root {
        color-scheme: dark;
        --text: #fff7ee;
        --muted: rgba(255, 247, 238, 0.74);
        --line: rgba(255, 247, 238, 0.32);
        --shadow: rgba(0, 0, 0, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.76), rgba(0, 0, 0, 0.24)),
          linear-gradient(0deg, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.32)),
          url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat fixed;
      }

      main {
        display: grid;
        min-height: 100svh;
        padding: clamp(1.5rem, 4vw, 4rem);
      }

      .hero {
        align-self: end;
        max-width: 760px;
        text-shadow: 0 0.25rem 1.75rem var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        gap: 0.75rem;
        align-items: center;
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: clamp(0.78rem, 1.4vw, 0.95rem);
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 3.25rem;
        height: 1px;
        background: var(--line);
        content: "";
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 13vw, 10.5rem);
        line-height: 0.86;
        letter-spacing: -0.08em;
        text-transform: uppercase;
      }

      p {
        max-width: 36rem;
        margin: 1.5rem 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        margin-top: 2rem;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0.85rem 1.15rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(10px);
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-decoration: none;
        text-transform: uppercase;
        transition:
          background 180ms ease,
          transform 180ms ease;
      }

      .button:hover,
      .button:focus-visible {
        background: rgba(255, 247, 238, 0.16);
        transform: translateY(-2px);
      }

      footer {
        align-self: end;
        justify-self: end;
        color: rgba(255, 247, 238, 0.56);
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 700px) {
        body {
          background:
            linear-gradient(0deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.2)),
            url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat;
        }

        main {
          gap: 2.5rem;
        }

        footer {
          justify-self: start;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-label="Forside">
        <h1>ISEN BRYDER</h1>
        <p>
          Cæcilie Balling - Vi løber - udkommer 26.06.26 &rarr; pre save her:
          <a href="https://bfan.link/vi-lober">https://bfan.link/vi-lober</a>
        </p>
      </section>

      <footer>Artwork/photo: Kaspar Vig</footer>
    </main>
  </body>
</html>
