<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isen Bryder Records</title>
    <meta name="description" content="Isen Bryder Records" />
    <meta name="theme-color" content="#050505" />

    <meta property="og:title" content="Isen Bryder Records" />
    <meta property="og:description" content="Isen Bryder Records" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="Artwork_Vi%20l%C3%B8ber_photo_KasparVig.jpg" />
    <style>
      :root {
        color-scheme: dark;
        --paper: #060606;
        --ink: #f6f1df;
        --muted: #9c9788;
        --blue: #9ec8ff;
        --line: rgba(246, 241, 223, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        background: var(--paper);
      }

      .mesh {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .mesh::before {
        content: "";
        position: absolute;
        inset: -5%;
        background:
          linear-gradient(90deg, rgba(246, 241, 223, 0.18) 1px, transparent 1px) 0 0 / 30px 30px;
        filter: url("#wave-displace");
        opacity: 0.62;
      }

      .mesh::after {
        content: "";
        position: absolute;
        inset: -3%;
        background:
          linear-gradient(90deg, rgba(158, 200, 255, 0.13) 1px, transparent 1px) 22px 0 / 30px 30px,
          linear-gradient(90deg, rgba(255, 96, 175, 0.08) 1px, transparent 1px) -18px 0 / 30px 30px,
          radial-gradient(ellipse at 38% 42%, rgba(246, 241, 223, 0.12), transparent 38%);
        filter: url("#twirl-displace");
        mask-image:
          repeating-linear-gradient(
            0deg,
            transparent 0 28px,
            #000 28px 76px,
            transparent 76px 122px,
            #000 122px 146px,
            transparent 146px 210px
          );
        opacity: 0.36;
        mix-blend-mode: screen;
      }

      main {
        position: relative;
        z-index: 1;
        min-height: 100svh;
        display: grid;
        grid-template-columns: minmax(280px, 0.88fr) minmax(320px, 1.12fr);
        gap: clamp(22px, 5vw, 72px);
        align-items: center;
        padding: clamp(16px, 4vw, 48px);
        padding-bottom: clamp(72px, 10vw, 118px);
      }

      .record {
        align-self: center;
        justify-self: center;
        width: min(100%, 620px);
        margin: 0;
        border: 1px solid var(--ink);
        background: #111;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 1;
        object-fit: contain;
      }

      .caption {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 8px 10px;
        border-top: 1px solid var(--ink);
        font-size: 12px;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .copy {
        align-self: center;
        width: min(100%, 760px);
        padding-top: 1px;
      }

      p {
        display: grid;
        gap: clamp(18px, 2.3vw, 34px);
        max-width: 12.6em;
        margin: 0;
        font-size: clamp(34px, 5.8vw, 78px);
        font-weight: 400;
        line-height: 0.88;
      }

      .artist {
        display: block;
        max-width: 8.8em;
        letter-spacing: 0.012em;
      }

      .title {
        display: block;
        margin-top: clamp(8px, 1vw, 16px);
        letter-spacing: 0.035em;
      }

      .release {
        display: block;
        width: fit-content;
        margin-top: clamp(4px, 0.6vw, 10px);
        padding: 0.16em 0.2em 0.18em;
        border: 1px solid var(--ink);
        background: var(--paper);
        font-size: 0.48em;
        line-height: 1;
        letter-spacing: 0.015em;
      }

      .pre-save {
        display: block;
        margin-top: clamp(8px, 1vw, 16px);
        color: var(--muted);
        font-size: 0.34em;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      a {
        display: inline-block;
        max-width: 100%;
        color: var(--blue);
        font-size: 0.34em;
        line-height: 1.05;
        text-decoration-thickness: 1px;
        text-underline-offset: 0.16em;
        overflow-wrap: anywhere;
      }

      h1 {
        position: fixed;
        z-index: 2;
        left: clamp(16px, 4vw, 48px);
        bottom: clamp(16px, 3vw, 34px);
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        font-size: clamp(16px, 2vw, 24px);
        font-weight: 700;
        line-height: 0.96;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      @media (max-width: 820px) {
        main {
          min-height: 100dvh;
          grid-template-columns: 1fr;
          align-items: start;
          padding: 14px 14px 78px;
          gap: 10px;
        }

        .copy {
          width: 100%;
        }

        .record {
          width: min(100%, 520px);
        }

        p {
          max-width: 100%;
          font-size: clamp(34px, 12vw, 62px);
        }

        h1 {
          left: 14px;
          bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <svg aria-hidden="true" width="0" height="0" style="position: absolute">
      <filter id="wave-displace" x="-12%" y="-12%" width="124%" height="124%" filterRes="140 100">
        <feTurbulence type="fractalNoise" baseFrequency="0.006 0.035" numOctaves="2" seed="17" result="softNoise" />
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="58" xChannelSelector="R" yChannelSelector="G" result="wave" />
        <feGaussianBlur in="wave" stdDeviation="0.18" />
      </filter>

      <filter id="twirl-displace" x="-16%" y="-16%" width="132%" height="132%" filterRes="95 80">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="3" seed="41" result="twirlNoise" />
        <feDisplacementMap in="SourceGraphic" in2="twirlNoise" scale="92" xChannelSelector="R" yChannelSelector="B" />
      </filter>
    </svg>

    <div class="mesh" aria-hidden="true"></div>

    <main>
      <figure class="record">
        <img src="Artwork_Vi løber_photo_KasparVig.jpg" alt="" />
        <figcaption class="caption">
          <span>IBR-001</span>
          <span>26.06.26</span>
        </figcaption>
      </figure>

      <section class="copy" aria-label="Forside">
        <p>
          <span class="artist">Cæcilie Balling<span class="title">Vi løber</span></span>
          <span class="release">udkommer 26.06.26</span>
          <span class="pre-save">pre-save:</span>
          <a href="https://bfan.link/vi-lober">https://bfan.link/vi-lober</a>
        </p>
      </section>

      <h1>ISEN BRYDER RECORDS</h1>
    </main>
  </body>
</html>
