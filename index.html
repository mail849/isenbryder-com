<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isen Bryder Records</title>
    <meta
      name="description"
      content="Isen Bryder Records — uafhængigt pladeselskab. Musik, udgivelser og nyheder fra isenbryder.com."
    />
    <meta name="theme-color" content="#070707" />

    <meta property="og:title" content="Isen Bryder Records" />
    <meta
      property="og:description"
      content="Uafhængigt pladeselskab. Musik, udgivelser og nyheder."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://isenbryder.com/" />
    <meta property="og:image" content="https://isenbryder.com/Artwork_Vi%20løber_photo_KasparVig.jpg" />

    <style>
      :root {
        --bg: #070707;
        --fg: #f5f1e8;
        --muted: rgba(245, 241, 232, 0.72);
        --line: rgba(245, 241, 232, 0.2);
        --glass: rgba(7, 7, 7, 0.56);
        --accent: #d8e8ff;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--fg);
        background:
          radial-gradient(circle at 20% 10%, rgba(216, 232, 255, 0.18), transparent 30rem),
          linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 45%),
          var(--bg);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: clamp(1.25rem, 3vw, 2.5rem);
      }

      header,
      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        position: relative;
        z-index: 2;
      }

      .brand,
      .domain,
      footer {
        font-size: 0.78rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .domain,
      footer {
        color: var(--muted);
      }

      main {
        display: grid;
        place-items: center;
        padding: clamp(2.5rem, 7vw, 5rem) 0;
      }

      .hero {
        width: min(100%, 1120px);
        display: grid;
        grid-template-columns: minmax(260px, 0.92fr) minmax(280px, 1fr);
        align-items: center;
        gap: clamp(2rem, 6vw, 5.5rem);
      }

      .artwork-wrap {
        position: relative;
      }

      .artwork-wrap::before {
        content: "";
        position: absolute;
        inset: 7%;
        z-index: -1;
        border-radius: 2rem;
        background: rgba(216, 232, 255, 0.34);
        filter: blur(3rem);
      }

      .artwork {
        width: 100%;
        display: block;
        border: 1px solid var(--line);
        border-radius: clamp(1rem, 2vw, 1.75rem);
        box-shadow: 0 2rem 5rem rgba(0, 0, 0, 0.5);
      }

      .content {
        padding: clamp(1.2rem, 3vw, 2rem);
        border: 1px solid var(--line);
        border-radius: clamp(1rem, 2vw, 1.75rem);
        background: var(--glass);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 1rem;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 9ch;
        margin: 0;
        font-size: clamp(3.25rem, 9vw, 7.5rem);
        line-height: 0.88;
        letter-spacing: -0.08em;
        text-transform: uppercase;
      }

      .intro {
        max-width: 34rem;
        margin: clamp(1.25rem, 3vw, 2rem) 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.8vw, 1.25rem);
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        margin-top: clamp(1.5rem, 4vw, 2.5rem);
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0.85rem 1.1rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition:
          background 180ms ease,
          border-color 180ms ease,
          transform 180ms ease;
      }

      .button.primary {
        color: #070707;
        background: var(--fg);
        border-color: var(--fg);
      }

      .button:hover {
        transform: translateY(-2px);
        border-color: rgba(245, 241, 232, 0.55);
        background: rgba(245, 241, 232, 0.1);
      }

      .button.primary:hover {
        background: var(--accent);
        border-color: var(--accent);
      }

      @media (max-width: 820px) {
        header,
        footer {
          align-items: flex-start;
          flex-direction: column;
        }

        .hero {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }

        .artwork-wrap {
          max-width: 520px;
          margin: 0 auto;
        }

        h1 {
          max-width: 8ch;
        }
      }
    </style>
  </head>

  <body>
    <div class="page">
      <header aria-label="Top">
        <a class="brand" href="https://isenbryder.com/" aria-label="Isen Bryder Records forside">
          Isen Bryder Records
        </a>
        <a class="domain" href="https://isenbryder.com/">isenbryder.com</a>
      </header>

      <main>
        <section class="hero" aria-label="Landingpage for Isen Bryder Records">
          <div class="artwork-wrap">
            <img
              class="artwork"
              src="Artwork_Vi løber_photo_KasparVig.jpg"
              alt="Artwork til Isen Bryder Records fotograferet af Kaspar Vig"
            />
          </div>

          <div class="content">
            <p class="eyebrow">Independent label</p>
            <h1>Isen Bryder Records</h1>
            <p class="intro">
              Uafhængigt pladeselskab for nye udgivelser, skæve sange og kolde
              strømme. Mere musik er på vej.
            </p>
            <div class="actions" aria-label="Links">
              <a class="button primary" href="mailto:kontakt@isenbryder.com">Kontakt</a>
              <a class="button" href="https://isenbryder.com/">isenbryder.com</a>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <span>© <span id="year">2026</span> Isen Bryder Records</span>
        <span>Artwork photo: Kaspar Vig</span>
      </footer>
    </div>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
