<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isen Bryder Records</title>
    <meta name="description" content="Isen Bryder Records" />
    <meta name="theme-color" content="#050505" />

    <meta property="og:title" content="Isen Bryder Records" />
    <meta property="og:description" content="Isen Bryder Records" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="Artwork_Vi%20l%C3%B8ber_photo_KasparVig.jpg" />

    <style>
      :root {
        color-scheme: dark;
        --text: #fff7ee;
        --muted: rgba(255, 247, 238, 0.74);
        --line: rgba(255, 247, 238, 0.32);
        --shadow: rgba(0, 0, 0, 0.62);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--text);
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.76), rgba(0, 0, 0, 0.24)),
          linear-gradient(0deg, rgba(0, 0, 0, 0.32), rgba(0, 0, 0, 0.32)),
          url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat fixed;
      }

      main {
        display: grid;
        position: relative;
        min-height: 100svh;
        padding: clamp(1.5rem, 4vw, 4rem);
      }

      .hero {
        position: absolute;
        left: clamp(1.5rem, 4vw, 4rem);
        top: clamp(1.5rem, 4vw, 4rem);
        max-width: min(54rem, calc(100% - clamp(3rem, 8vw, 8rem)));
        text-shadow: 0 0.25rem 1.75rem var(--shadow);
      }

      .eyebrow {
        display: inline-flex;
        gap: 0.75rem;
        align-items: center;
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: clamp(0.78rem, 1.4vw, 0.95rem);
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 3.25rem;
        height: 1px;
        background: var(--line);
        content: "";
      }

      h1 {
        position: absolute;
        left: clamp(1.5rem, 4vw, 4rem);
        bottom: clamp(1.5rem, 4vw, 4rem);
        max-width: min(34rem, calc(100% - clamp(3rem, 8vw, 8rem)));
        margin: 0;
        font-size: clamp(1.06rem, 2.55vw, 2rem);
        line-height: 0.95;
        letter-spacing: -0.02em;
        text-transform: uppercase;
        text-shadow: 0 0.25rem 1.75rem var(--shadow);
      }

      p {
        max-width: 52rem;
        margin: 0;
        color: var(--text);
        font-size: clamp(1.57rem, 4.42vw, 3.95rem);
        font-weight: 750;
        letter-spacing: -0.03em;
        line-height: 1.12;
      }

      p a {
        display: inline-block;
        margin-top: 0.12em;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.12em;
      }

      .pre-save {
        display: block;
        margin-top: 0.16em;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.85rem;
        margin-top: 2rem;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 3rem;
        padding: 0.85rem 1.15rem;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(10px);
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-decoration: none;
        text-transform: uppercase;
        transition:
          background 180ms ease,
          transform 180ms ease;
      }

      .button:hover,
      .button:focus-visible {
        background: rgba(255, 247, 238, 0.16);
        transform: translateY(-2px);
      }

      @media (max-width: 700px) {
        body {
          background:
            linear-gradient(0deg, rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.2)),
            url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat;
        }

        main {
          min-height: 100dvh;
          padding: 1rem;
        }

        .hero {
          left: 1rem;
          right: 1rem;
          top: 1rem;
          max-width: none;
        }

        p {
          max-width: 100%;
          font-size: clamp(1.12rem, 5.7vw, 1.45rem);
          letter-spacing: -0.015em;
          line-height: 1.18;
        }

        p a {
          display: block;
          margin-top: 0.3em;
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        h1 {
          left: 1rem;
          right: 1rem;
          bottom: calc(1rem + env(safe-area-inset-bottom));
          max-width: none;
          font-size: clamp(0.95rem, 4.4vw, 1.18rem);
          line-height: 1;
          letter-spacing: 0.005em;
        }
      }

      @media (orientation: portrait) and (max-width: 1100px) {
        body {
          background:
            linear-gradient(0deg, rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.18)),
            url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat;
        }

        main {
          min-height: 100dvh;
          padding: clamp(1.25rem, 5vw, 4rem);
        }

        .hero {
          left: clamp(1.25rem, 5vw, 4rem);
          right: clamp(1.25rem, 5vw, 4rem);
          top: 42vh;
          max-width: none;
        }

        p {
          max-width: 9.8em;
          font-size: clamp(1.55rem, 7.2vw, 4.85rem);
          letter-spacing: -0.018em;
          line-height: 1.16;
        }

        .pre-save {
          margin-top: 0.24em;
        }

        p a {
          display: block;
          margin-top: 0.28em;
          overflow-wrap: anywhere;
          word-break: break-word;
        }

        h1 {
          left: clamp(1.25rem, 5vw, 4rem);
          right: clamp(1.25rem, 5vw, 4rem);
          bottom: calc(clamp(1.25rem, 5vw, 4rem) + env(safe-area-inset-bottom));
          max-width: none;
          font-size: clamp(1rem, 3.1vw, 2.1rem);
          letter-spacing: 0.01em;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-label="Forside">
        <p>
          Cæcilie Balling - Vi løber<br />
          Udkommer 26.06.26
          <span class="pre-save">pre save her:</span>
          <a href="https://bfan.link/vi-lober">https://bfan.link/vi-lober</a>
        </p>
      </section>

      <h1>ISEN BRYDER RECORDS</h1>
    </main>
  </body>
</html>
