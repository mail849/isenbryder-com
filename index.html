<!doctype html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isen Bryder Records</title>
    <meta name="description" content="Isen Bryder Records" />
    <meta name="theme-color" content="#050505" />

    <meta property="og:title" content="Isen Bryder Records" />
    <meta property="og:description" content="Isen Bryder Records" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="Artwork_Vi%20l%C3%B8ber_photo_KasparVig.jpg" />

    <style>
      :root {
        color-scheme: dark;
        --text: #fff7cc;
        --link: #8fd7ff;
        --shadow: rgba(0, 0, 0, 0.82);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Times New Roman", Times, serif;
        color: var(--text);
        background:
          linear-gradient(90deg, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.16)),
          linear-gradient(0deg, rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.22)),
          url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat fixed;
      }

      main {
        position: relative;
        min-height: 100svh;
        padding: 24px;
      }

      .hero {
        position: absolute;
        left: 24px;
        top: 24px;
        max-width: 680px;
        text-shadow:
          2px 2px 0 #000,
          0 0 14px var(--shadow);
      }

      h1 {
        position: absolute;
        left: 24px;
        bottom: 24px;
        margin: 0;
        font-size: 22px;
        font-weight: normal;
        line-height: 1.1;
        text-shadow:
          2px 2px 0 #000,
          0 0 12px var(--shadow);
      }

      p {
        margin: 0;
        color: var(--text);
        font-size: 34px;
        font-weight: normal;
        line-height: 1.12;
      }

      p a {
        display: inline-block;
        margin-top: 0.16em;
        color: var(--link);
        text-decoration: underline;
      }

      .pre-save {
        display: block;
        margin-top: 0.4em;
      }

      a {
        color: var(--link);
      }

      @media (max-width: 700px) {
        body {
          background:
            linear-gradient(0deg, rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.14)),
            url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat;
        }

        main {
          min-height: 100dvh;
          padding: 14px;
        }

        .hero {
          left: 14px;
          right: 14px;
          top: 14px;
          max-width: none;
        }

        p {
          font-size: 22px;
          line-height: 1.14;
        }

        p a {
          display: block;
          overflow-wrap: anywhere;
          font-size: 19px;
        }

        h1 {
          left: 14px;
          right: 14px;
          bottom: calc(1rem + env(safe-area-inset-bottom));
          font-size: 18px;
        }
      }

      @media (orientation: portrait) and (max-width: 1100px) {
        body {
          background:
            linear-gradient(0deg, rgba(0, 0, 0, 0.58), rgba(0, 0, 0, 0.14)),
            url("Artwork_Vi løber_photo_KasparVig.jpg") center / cover no-repeat;
        }

        main {
          min-height: 100dvh;
          padding: 18px;
        }

        .hero {
          left: 18px;
          right: 18px;
          top: 38vh;
          max-width: none;
        }

        p {
          max-width: 12em;
          font-size: 28px;
          line-height: 1.12;
        }

        .pre-save {
          margin-top: 0.24em;
        }

        p a {
          display: block;
          margin-top: 0.32em;
          max-width: 100%;
          font-size: 21px;
          overflow-wrap: anywhere;
        }

        h1 {
          left: 18px;
          right: 18px;
          bottom: calc(18px + env(safe-area-inset-bottom));
          font-size: 21px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero" aria-label="Forside">
        <p>
          Cæcilie Balling - Vi løber<br />
          udkommer 26.06.26
          <span class="pre-save">pre-save:</span>
          <a href="https://bfan.link/vi-lober">https://bfan.link/vi-lober</a>
        </p>
      </section>

      <h1>ISEN BRYDER RECORDS</h1>
    </main>
  </body>
</html>
